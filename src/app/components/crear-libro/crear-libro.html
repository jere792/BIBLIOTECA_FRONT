<div class="create-book-container">
  <div class="create-book-card">
    <h1>Crear Libro</h1>

    <div class="top-section">
      <div class="image-column">
        <div class="image-placeholder"></div>
        <button type="button" class="image-button">Agregar Imagen</button>
      </div>

      <div class="right-panel">
        <select class="dropdown" aria-label="Seleccionar opción"></select>

        <label class="description-label" for="descripcion">Descripcion</label>
        <textarea
          id="descripcion"
          class="description-box"
          placeholder=""
        ></textarea>
      </div>
    </div>

    <div class="bottom-section">
      <div class="bottom-column">
        <input type="text" placeholder="Titulo">
        <input type="text" placeholder="Autor">
        <input type="number" placeholder="Año de Publicacion">
      </div>

      <div class="bottom-column">
        <input type="number" placeholder="Precio">
        <input type="number" placeholder="Stock">
        <select class="dropdown" aria-label="Categoria"></select>
      </div>
    </div>

    <div class="actions-row">
      <button type="button" class="create-button">Crear</button>
    </div>
  </div>
</div>
